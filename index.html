<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoHero - Salve a Comunidade 🌿</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            gap: 20px;
        }
        canvas {
            display: block;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            cursor: pointer;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 70%, #90EE90 100%);
        }
        .ui-overlay {
            display: flex;
            flex-direction: column;
            pointer-events: none;
            z-index: 100;
            order: -1;
        }
        .hud {
            background: rgba(0,0,0,0.8);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .life-bar {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }
        .life-container {
            width: 180px;
            height: 18px;
            background: #333;
            border-radius: 9px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .life {
            height: 100%;
            background: linear-gradient(90deg, #FF4757, #FF6B7A, #FF8E8E);
            width: 100%;
            transition: width 0.4s ease;
            position: relative;
        }
        .life::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shine 2s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .stats {
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .heart { color: #FF4757; font-size: 26px; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div class="ui-overlay" id="uiOverlay" style="display: none;">
        <div class="objective" style="text-align: center; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0px 4px 6px rgba(0,0,0,0.6); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1.5px;">
            ♻️ Colete e recicle corretamente!
        </div>
        <div class="hud">
            <div class="life-bar">
                <span style="font-size: 16px; font-weight: bold;">Vida</span>
                <div class="life-container">
                    <div class="life" id="lifeBar"></div>
                </div>
            </div>
            <div class="stats">
                <span class="heart" id="chances">♥♥♥</span>
                <span style="color: #FFD54F;">Nível <span id="levelDisplay">1</span></span>
                <span>Pontos: <span id="score">0</span></span>
                <span>♻️ Reciclados: <span id="items">0</span></span>
                <span id="keyStatus" style="filter: grayscale(100%); transition: 0.3s;">🔑</span>
                <span style="background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 10px;">🎒 Mão: <span id="inventoryStatus">Vazia</span></span>
            </div>
        </div>
    </div>

    <script>
        class EcoHeroGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                
                // ESTADO GLOBAL
                this.currentScreen = 'MENU';
                this.gameState = { score: 0, items: 0, level: 1 };
                this.difficulty = 'FACIL';
                this.animationFrame = 0;
                
                // PLAYER - MECÂNICA 100% CORRIGIDA
                this.player = {
                    x: 100, y: 400, width: 45, height: 55,
                    vx: 0, vy: 0,
                    speed: 4, jumpPower: -17,
                    onGround: false, groundedTimer: 0,
                    jumps: 0, maxJumps: 2,
                    life: 100, maxLife: 100, chances: 3,
                    facingRight: true, animationFrame: 0,
                    jumpRotation: 0
                };
                
                // INPUT
                this.keys = {};
                this.mouseX = 0;
                this.mouseY = 0;
                this.totalItemsToCollect = 4;
                
                // ELEMENTOS DO JOGO
                this.platforms = [];
                this.enemies = [];
                this.trashItems = [];
                this.bins = [];
                this.key = null;
                this.door = null;
                this.scenery = {};
                
                // ÁUDIO
                this.initAudio();
                
                this.init();
                this.resetGameElements();
            }
            
            initAudio() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.sounds = {
                    jump: this.createSound(600, 0.2, 'sine'),
                    collect: this.createSound(1000, 0.15, 'square'),
                    damage: this.createSound(200, 0.3, 'sawtooth'),
                    click: this.createSound(800, 0.1, 'triangle')
                };
            }
            
            createSound(freq, duration, type) {
                return () => {
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(this.audioContext.destination);
                    
                    osc.frequency.setValueAtTime(freq, this.audioContext.currentTime);
                    osc.type = type;
                    
                    gain.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                    
                    osc.start();
                    osc.stop(this.audioContext.currentTime + duration);
                };
            }
            
            init() {
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                document.addEventListener('keydown', (e) => this.handleKeydown(e));
                document.addEventListener('keyup', (e) => this.handleKeyup(e));
                
                document.getElementById('uiOverlay').style.display = 'none';
                this.gameLoop();
            }
            
            handleClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                this.mouseX = e.clientX - rect.left;
                this.mouseY = e.clientY - rect.top;
                this.sounds.click();
                
                switch(this.currentScreen) {
                    case 'MENU':
                        this.handleMenuClick();
                        break;
                    case 'DIFFICULTY':
                        this.handleDifficultyClick();
                        break;
                    case 'TUTORIAL':
                    case 'CREDITS':
                    case 'WIN':
                        this.currentScreen = 'MENU';
                        break;
                    case 'QUIZ':
                        this.handleQuizClick();
                        break;
                }
            }
            
            handleMenuClick() {
                // JOGAR (botão central)
                if (this.mouseX > 300 && this.mouseX < 700 && this.mouseY > 280 && this.mouseY < 340) {
                    this.currentScreen = 'DIFFICULTY';
                }
                // TUTORIAL
                else if (this.mouseX > 300 && this.mouseX < 700 && this.mouseY > 360 && this.mouseY < 420) {
                    this.currentScreen = 'TUTORIAL';
                }
                // CRÉDITOS
                else if (this.mouseX > 300 && this.mouseX < 700 && this.mouseY > 440 && this.mouseY < 500) {
                    this.currentScreen = 'CREDITS';
                }
            }
            
            handleDifficultyClick() {
                if (this.mouseX > 300 && this.mouseX < 700 && this.mouseY > 240 && this.mouseY < 300) {
                    this.difficulty = 'FACIL';
                    this.startGame();
                } else if (this.mouseX > 300 && this.mouseX < 700 && this.mouseY > 320 && this.mouseY < 380) {
                    this.difficulty = 'INTERMEDIARIO';
                    this.startGame();
                } else if (this.mouseX > 300 && this.mouseX < 700 && this.mouseY > 400 && this.mouseY < 460) {
                    this.difficulty = 'DIFICIL';
                    this.startGame();
                } 
                // VOLTAR
                else if (this.mouseX > 400 && this.mouseX < 600 && this.mouseY > 500 && this.mouseY < 560) {
                    this.currentScreen = 'MENU';
                }
            }
            
            handleKeydown(e) {
                this.keys[e.code] = true;
                if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                    e.preventDefault(); // Evita a rolagem da página
                }
                if (e.code === 'Space') {
                    if (this.currentScreen === 'GAME') this.playerJump();
                }
            }
            
            handleKeyup(e) {
                this.keys[e.code] = false;
            }
            
            playerJump() {
                if (this.player.onGround || this.player.jumps < this.player.maxJumps) {
                    this.player.vy = this.player.jumpPower;
                    this.player.onGround = false;
                    this.player.groundedTimer = 0;
                    this.player.jumps++;
                    this.sounds.jump();
                }
            }
            
            resetGameElements() {
                
                // LIXEIRAS NOS 4 CANTOS
                this.bins = [
                    {x: 40, y: 110, width: 50, height: 50, type: 'paper', color: '#2196F3', label: 'Papel'},
                    {x: 900, y: 110, width: 50, height: 50, type: 'plastic', color: '#F44336', label: 'Plástico'},
                    {x: 40, y: 470, width: 50, height: 50, type: 'glass', color: '#4CAF50', label: 'Vidro'},
                    {x: 900, y: 470, width: 50, height: 50, type: 'metal', color: '#FFEB3B', label: 'Metal'}
                ];

                // INIMIGOS VOADORES
                if (this.difficulty === 'FACIL') {
                    this.enemies = [
                        {x: 350, y: 250, width: 40, height: 40, vx: 2.0, vy: 0, type: 'flying_pollution'}
                    ];
                } else if (this.difficulty === 'INTERMEDIARIO') {
                    this.enemies = [
                        {x: 350, y: 150, width: 40, height: 40, vx: 2.8, vy: 2.5, type: 'flying_pollution'},
                        {x: 650, y: 300, width: 40, height: 40, vx: -2.8, vy: -2.5, type: 'flying_pollution'}
                    ];
                } else { // DIFICIL
                    this.enemies = [
                        {x: 350, y: 150, width: 40, height: 40, vx: 2.8, vy: 2.5, type: 'flying_pollution'},
                        {x: 650, y: 300, width: 40, height: 40, vx: -2.8, vy: -2.5, type: 'flying_pollution'},
                        {x: 200, y: 350, width: 40, height: 40, vx: 2.5, vy: -2.8, type: 'flying_pollution'}
                    ];
                }

                // GERAÇÃO DE NÍVEIS
                if (this.gameState.level === 1) {
                    this.totalItemsToCollect = 4;
                    this.platforms = [
                        {x: 0, y: 520, width: 1000, height: 80, color: '#8B4513', isSolid: true},
                        {x: 10, y: 160, width: 120, height: 20, color: '#DEB887'},
                        {x: 870, y: 160, width: 120, height: 20, color: '#DEB887'},
                        {x: 400, y: 350, width: 200, height: 25, color: '#D2B48C'},
                        {x: 200, y: 260, width: 100, height: 20, color: '#CD853F'},
                        {x: 700, y: 260, width: 100, height: 20, color: '#CD853F'},
                        {x: 100, y: 400, width: 100, height: 20, color: '#A0522D'},
                        {x: 800, y: 400, width: 100, height: 20, color: '#A0522D'}
                    ];
                    this.key = {x: 485, y: 310, width: 30, height: 30, collected: false};
                    this.door = {x: 470, y: 440, width: 60, height: 80, isOpen: false};
                    this.trashItems = [
                        {x: 480, y: 320, width: 30, height: 30, type: 'paper', emoji: '📄', active: true},
                        {x: 230, y: 230, width: 30, height: 30, type: 'plastic', emoji: '🥤', active: true},
                        {x: 730, y: 230, width: 30, height: 30, type: 'glass', emoji: '🍾', active: true},
                        {x: 350, y: 490, width: 30, height: 30, type: 'metal', emoji: '🥫', active: true}
                    ];
                } else if (this.gameState.level === 2) {
                    this.totalItemsToCollect = 5;
                    this.platforms = [
                        {x: 0, y: 520, width: 1000, height: 80, color: '#8B4513', isSolid: true},
                        {x: 10, y: 160, width: 120, height: 20, color: '#DEB887'},
                        {x: 870, y: 160, width: 120, height: 20, color: '#DEB887'},
                        {x: 200, y: 280, width: 120, height: 20, color: '#D2B48C'},
                        {x: 680, y: 280, width: 120, height: 20, color: '#D2B48C'},
                        {x: 400, y: 200, width: 200, height: 20, color: '#CD853F'},
                        {x: 400, y: 380, width: 200, height: 20, color: '#A0522D'}
                    ];
                    this.key = {x: 485, y: 160, width: 30, height: 30, collected: false};
                    this.door = {x: 470, y: 440, width: 60, height: 80, isOpen: false};
                    this.trashItems = [
                        {x: 420, y: 160, width: 30, height: 30, type: 'paper', emoji: '📄', active: true},
                        {x: 240, y: 240, width: 30, height: 30, type: 'plastic', emoji: '🥤', active: true},
                        {x: 720, y: 240, width: 30, height: 30, type: 'glass', emoji: '🍾', active: true},
                        {x: 420, y: 340, width: 30, height: 30, type: 'metal', emoji: '🥫', active: true},
                        {x: 550, y: 340, width: 30, height: 30, type: 'paper', emoji: '📄', active: true}
                    ];
                } else { // LEVEL 3
                    this.totalItemsToCollect = 6;
                    this.platforms = [
                        {x: 0, y: 520, width: 1000, height: 80, color: '#8B4513', isSolid: true},
                        {x: 10, y: 160, width: 120, height: 20, color: '#DEB887'},
                        {x: 870, y: 160, width: 120, height: 20, color: '#DEB887'},
                        {x: 50, y: 380, width: 100, height: 20, color: '#A0522D'},
                        {x: 150, y: 260, width: 100, height: 20, color: '#A0522D'},
                        {x: 400, y: 320, width: 200, height: 20, color: '#CD853F'},
                        {x: 450, y: 180, width: 100, height: 20, color: '#CD853F'},
                        {x: 750, y: 260, width: 100, height: 20, color: '#D2B48C'},
                        {x: 850, y: 380, width: 100, height: 20, color: '#D2B48C'}
                    ];
                    this.key = {x: 485, y: 140, width: 30, height: 30, collected: false};
                    this.door = {x: 470, y: 440, width: 60, height: 80, isOpen: false};
                    this.trashItems = [
                        {x: 80, y: 340, width: 30, height: 30, type: 'paper', emoji: '📄', active: true},
                        {x: 180, y: 220, width: 30, height: 30, type: 'plastic', emoji: '🥤', active: true},
                        {x: 420, y: 280, width: 30, height: 30, type: 'glass', emoji: '🍾', active: true},
                        {x: 550, y: 280, width: 30, height: 30, type: 'metal', emoji: '🥫', active: true},
                        {x: 780, y: 220, width: 30, height: 30, type: 'paper', emoji: '📄', active: true},
                        {x: 880, y: 340, width: 30, height: 30, type: 'plastic', emoji: '🥤', active: true}
                    ];
                }
                
                // CENÁRIO
                this.scenery = {
                    clouds: [
                        {x: 100, y: 80, size: 60, speed: 0.2},
                        {x: 400, y: 120, size: 80, speed: 0.1},
                        {x: 700, y: 60, size: 70, speed: 0.15},
                        {x: 900, y: 100, size: 50, speed: 0.25}
                    ],
                    trees: [
                        {x: 250, y: 520, size: 80},
                        {x: 650, y: 520, size: 90},
                        {x: 450, y: 520, size: 70}
                    ],
                    sun: {x: 850, y: 80, radius: 50},
                    mountains: [
                        {x: -50, y: 320, width: 350, height: 200},
                        {x: 650, y: 300, width: 300, height: 220}
                    ]
                };
            }
            
            startGame() {
                this.currentScreen = 'GAME';
                this.resetGame();
                this.resetGameElements();
                document.getElementById('uiOverlay').style.display = 'flex';
            }
            
            resetGame() {
                this.player = {
                    x: 100, y: 400, width: 45, height: 55,
                    vx: 0, vy: 0, speed: 4, jumpPower: -17,
                    onGround: false, groundedTimer: 0,
                    jumps: 0, maxJumps: 2,
                    life: 100, maxLife: 100, chances: 3,
                    facingRight: true, animationFrame: 0,
                    carrying: null,
                    jumpRotation: 0
                };
                this.gameState = { score: 0, items: 0, level: 1 };
                this.keys = {};
                this.updateUI();
            }
            
            updatePlayer() {
                // ENTRADA HORIZONTAL
                let moving = false;
                if (this.keys['KeyA'] || this.keys['ArrowLeft']) {
                    this.player.vx = -this.player.speed;
                    this.player.facingRight = false;
                    moving = true;
                }
                if (this.keys['KeyD'] || this.keys['ArrowRight']) {
                    this.player.vx = this.player.speed;
                    this.player.facingRight = true;
                    moving = true;
                }
                
                // FRICÇÃO
                if (!moving && this.player.onGround) {
                    this.player.vx *= 0.82;
                    if (Math.abs(this.player.vx) < 0.5) this.player.vx = 0;
                } else if (!moving && !this.player.onGround) {
                    this.player.vx *= 0.95; // Fricção leve no ar para não deslizar infinito
                    if (Math.abs(this.player.vx) < 0.5) this.player.vx = 0;
                }
                
                // MOVIMENTO HORIZONTAL
                this.player.x += this.player.vx;
                
                // COLISÕES HORIZONTAIS
                this.platforms.forEach(platform => {
                    if (!platform.isSolid) return; // Ignora colisão horizontal se for plataforma atravessável
                    
                    // Margem de 5px no eixo Y para evitar travar no chão que está pisando
                    if (this.player.y + this.player.height - 5 > platform.y &&
                        this.player.y + 5 < platform.y + platform.height &&
                        this.player.x + this.player.width > platform.x &&
                        this.player.x < platform.x + platform.width) {
                        
                        if (this.player.vx > 0) {
                            this.player.x = platform.x - this.player.width;
                        } else if (this.player.vx < 0) {
                            this.player.x = platform.x + platform.width;
                        }
                        this.player.vx = 0;
                    }
                });
                
                // BORDAS DA TELA
                if (this.player.x < 5) this.player.x = 5;
                if (this.player.x > this.width - this.player.width - 5) 
                    this.player.x = this.width - this.player.width - 5;
                
                // GRAVIDADE E MOVIMENTO VERTICAL
                this.player.vy += 0.9;
                if (this.player.vy > 16) this.player.vy = 16;
                
                this.player.y += this.player.vy;
                
                // COLISÕES VERTICAIS
                this.player.onGround = false;
                // Salva a altura do pé do personagem no frame anterior para conferir se caiu por cima da plataforma
                const oldBottom = this.player.y - this.player.vy + this.player.height;
                
                this.platforms.forEach(platform => {
                    if (this.player.x + 8 < platform.x + platform.width &&
                        this.player.x + this.player.width - 8 > platform.x &&
                        this.player.y + this.player.height > platform.y &&
                        this.player.y < platform.y + platform.height) {
                        
                        if (platform.isSolid) {
                            if (this.player.vy > 0) {
                                this.player.y = platform.y - this.player.height;
                                this.player.vy = 0;
                                this.player.onGround = true;
                                this.player.jumps = 0;
                                this.player.groundedTimer++;
                            } else if (this.player.vy < 0) {
                                this.player.y = platform.y + platform.height;
                                this.player.vy = 0;
                            }
                        } else {
                            // Plataformas atravessáveis
                            const pressingDown = this.keys['ArrowDown'] || this.keys['KeyS'];
                            if (this.player.vy >= 0 && oldBottom <= platform.y + 0.5 && !pressingDown) {
                                this.player.y = platform.y - this.player.height;
                                this.player.vy = 0;
                                this.player.onGround = true;
                                this.player.jumps = 0;
                                this.player.groundedTimer++;
                            }
                        }
                    }
                });
                
                // ANIMAÇÃO
                if (this.player.onGround && Math.abs(this.player.vx) > 1) {
                    this.player.animationFrame += 0.15;
                }
                
                // QUEDA MORTAL
                if (this.player.y > this.height + 50) {
                    this.takeDamage(100);
                }
            }
            
            updateEnemies() {
                this.enemies.forEach(enemy => {
                    enemy.x += enemy.vx;
                    enemy.y += enemy.vy;
                    
                    if (enemy.x <= 10 || enemy.x >= this.width - enemy.width - 10) enemy.vx *= -1;
                    if (enemy.y <= 10 || enemy.y >= this.height - enemy.height - 90) enemy.vy *= -1;
                });
            }
            
            updateScenery() {
                this.scenery.clouds.forEach(cloud => {
                    cloud.x += cloud.speed;
                    if (cloud.x > this.width + 100) cloud.x = -100;
                });
            }
            
            checkCollisions() {
                // INIMIGOS
                this.enemies.forEach(enemy => {
                    if (this.checkAABB(this.player, enemy)) {
                        this.takeDamage(25);
                        enemy.x += (Math.random() - 0.5) * 100;
                    }
                });
                
                // COLETA DE LIXO
                this.trashItems.forEach(item => {
                    if (item.active && !this.player.carrying && this.checkAABB(this.player, item)) {
                        this.player.carrying = { type: item.type, emoji: item.emoji };
                        item.active = false;
                        this.sounds.collect();
                        this.updateUI();
                    }
                });

                // INTERAÇÃO COM LIXEIRAS
                this.bins.forEach(bin => {
                    if (this.player.carrying && this.checkAABB(this.player, bin)) {
                        if (this.player.carrying.type === bin.type) {
                            // Lixeira Correta!
                            this.gameState.score += 500;
                            this.gameState.items++;
                            this.sounds.collect();
                            this.player.carrying = null;
                            this.updateUI();
                        } else {
                            // Lixeira Errada!
                            this.takeDamage(30);
                            const droppedType = this.player.carrying.type;
                            this.player.carrying = null;
                            this.respawnTrash(droppedType);
                        }
                    }
                });

                // CHAVE
                if (this.key && !this.key.collected && this.checkAABB(this.player, this.key)) {
                    this.key.collected = true;
                    this.sounds.collect();
                    this.updateUI();
                }

                // PORTA
                if (this.door) {
                    this.door.isOpen = this.key.collected && this.gameState.items >= this.totalItemsToCollect;
                    if (this.door.isOpen && this.checkAABB(this.player, this.door)) {
                        this.levelComplete();
                    }
                }
            }

            respawnTrash(type) {
                const emojis = { paper: '📄', plastic: '🥤', glass: '🍾', metal: '🥫' };
                
                let spawnPoints = [];
                if (this.gameState.level === 1) spawnPoints = [{x: 480, y: 320}, {x: 230, y: 230}, {x: 730, y: 230}, {x: 350, y: 490}];
                else if (this.gameState.level === 2) spawnPoints = [{x: 420, y: 160}, {x: 240, y: 240}, {x: 720, y: 240}, {x: 420, y: 340}, {x: 550, y: 340}];
                else spawnPoints = [{x: 80, y: 340}, {x: 180, y: 220}, {x: 420, y: 280}, {x: 550, y: 280}, {x: 780, y: 220}, {x: 880, y: 340}];
                
                const pt = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
                this.trashItems.push({ x: pt.x, y: pt.y, width: 30, height: 30, type: type, emoji: emojis[type], active: true });
            }

            checkAABB(a, b) {
                return a.x < b.x + b.width &&
                       a.x + a.width > b.x &&
                       a.y < b.y + b.height &&
                       a.y + a.height > b.y;
            }
            
            takeDamage(amount) {
                this.player.life -= amount;
                this.sounds.damage();
                
                if (this.player.life <= 0) {
                    this.player.chances--;
                    this.player.life = this.player.maxLife;
                    this.player.x = 100;
                    this.player.y = 400;
                    this.player.vy = 0;
                    this.player.jumps = 0;
                    
                    if (this.player.chances <= 0) {
                        setTimeout(() => {
                            alert(`🌿 GAME OVER! 🌿\nSua pontuação final: ${this.gameState.score}`);
                            this.currentScreen = 'MENU';
                            document.getElementById('uiOverlay').style.display = 'none';
                            this.resetGameElements();
                        }, 100);
                    }
                }
                this.updateUI();
            }

            updateUI() {
                const lifeBar = document.getElementById('lifeBar');
                if (lifeBar) lifeBar.style.width = `${Math.max(0, (this.player.life / this.player.maxLife) * 100)}%`;
                
                const chances = document.getElementById('chances');
                if (chances) chances.innerText = '♥'.repeat(Math.max(0, this.player.chances));
                
                const score = document.getElementById('score');
                if (score) score.innerText = this.gameState.score;
                
                const items = document.getElementById('items');
                if (items) items.innerText = this.gameState.items + '/' + this.totalItemsToCollect;
                
                const levelDisplay = document.getElementById('levelDisplay');
                if (levelDisplay) levelDisplay.innerText = this.gameState.level;

                const keyStatus = document.getElementById('keyStatus');
                if (keyStatus) {
                    keyStatus.style.filter = this.key && this.key.collected ? 'none' : 'grayscale(100%)';
                }
                
                const inventoryStatus = document.getElementById('inventoryStatus');
                if (inventoryStatus) {
                    inventoryStatus.innerText = this.player.carrying ? this.player.carrying.emoji : 'Vazia';
                }
            }

            levelComplete() {
                this.gameState.score += this.player.life * 10; // Bônus de vida
                
                if (this.gameState.level < 3) {
                    this.gameState.level++;
                    alert(`🌿 Nível ${this.gameState.level - 1} Concluído! 🌿\nPreparado para o Nível ${this.gameState.level}?`);
                    
                    // Configura o jogador para a próxima fase
                    this.gameState.items = 0;
                    this.player.x = 100;
                    this.player.y = 400;
                    this.player.vx = 0;
                    this.player.vy = 0;
                    this.player.carrying = null;
                    this.keys = {};
                    
                    this.resetGameElements();
                    this.updateUI();
                } else {
                    this.initQuiz();
                    document.getElementById('uiOverlay').style.display = 'none';
                }
            }

            initQuiz() {
                this.currentScreen = 'QUIZ';
                this.currentQuizIndex = 0;
                this.quizQuestions = [
                    { q: "Qual lixo deve ser descartado na lixeira AZUL?", opts: ["Papel", "Plástico", "Vidro", "Metal"], ans: 0 },
                    { q: "Qual lixo deve ser descartado na lixeira VERMELHA?", opts: ["Metal", "Vidro", "Papel", "Plástico"], ans: 3 },
                    { q: "Qual lixo deve ser descartado na lixeira VERDE?", opts: ["Plástico", "Metal", "Vidro", "Papel"], ans: 2 },
                    { q: "Qual lixo deve ser descartado na lixeira AMARELA?", opts: ["Vidro", "Metal", "Papel", "Plástico"], ans: 1 }
                ];
            }
            
            handleQuizClick() {
                const q = this.quizQuestions[this.currentQuizIndex];
                for (let i = 0; i < 4; i++) {
                    let btnY = 250 + i * 70;
                    if (this.mouseX > 300 && this.mouseX < 700 && this.mouseY > btnY && this.mouseY < btnY + 50) {
                        if (i === q.ans) {
                            this.sounds.collect();
                            this.gameState.score += 500;
                            alert("Resposta Correta! +500 pontos!");
                        } else {
                            this.sounds.damage();
                            alert("Resposta Incorreta! O correto era: " + q.opts[q.ans]);
                        }
                        
                        this.currentQuizIndex++;
                        if (this.currentQuizIndex >= this.quizQuestions.length) {
                            this.currentScreen = 'WIN';
                            this.sendScoreToBackend(this.gameState.score);
                        }
                        break;
                    }
                }
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }

            update() {
                if (this.currentScreen === 'GAME') {
                    this.updatePlayer();
                    this.updateEnemies();
                    this.updateScenery();
                    this.checkCollisions();
                }
            }

            draw() {
                this.ctx.clearRect(0, 0, this.width, this.height);

                switch(this.currentScreen) {
                    case 'MENU':
                        this.drawMenu();
                        break;
                    case 'DIFFICULTY':
                        this.drawDifficulty();
                        break;
                    case 'TUTORIAL':
                        this.drawTutorial();
                        break;
                    case 'CREDITS':
                        this.drawCredits();
                        break;
                    case 'GAME':
                        this.drawGame();
                        break;
                    case 'WIN':
                        this.drawWin();
                        break;
                    case 'QUIZ':
                        this.drawQuiz();
                        break;
                }
            }

            async sendScoreToBackend(score) {
                const playerName = prompt("Parabéns! Digite seu nome para o placar:");
                if (!playerName) return;

                try {
                    const response = await fetch('https://sua-api.exemplo.com/scores', {
                        method: 'POST', // Estamos enviando dados
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: playerName, score: score })
                    });

                    if (response.ok) alert("Sua pontuação foi salva no placar online!");
                    else alert("Houve um erro ao salvar sua pontuação.");
                } catch (error) {
                    console.error("Erro de conexão com o backend:", error);
                }
            }

            drawGame() {
                // Desenha montanhas
                this.scenery.mountains.forEach(m => {
                    this.ctx.fillStyle = '#546E7A';
                    this.ctx.beginPath();
                    this.ctx.moveTo(m.x, m.y + m.height);
                    this.ctx.lineTo(m.x + m.width / 2, m.y);
                    this.ctx.lineTo(m.x + m.width, m.y + m.height);
                    this.ctx.fill();
                });

                // Desenha Sol
                this.ctx.fillStyle = '#FFD54F';
                this.ctx.beginPath();
                this.ctx.arc(this.scenery.sun.x, this.scenery.sun.y, this.scenery.sun.radius, 0, Math.PI * 2);
                this.ctx.fill();

                // Desenha Nuvens
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                this.scenery.clouds.forEach(c => {
                    this.ctx.beginPath();
                    this.ctx.arc(c.x, c.y, c.size / 2, 0, Math.PI * 2);
                    this.ctx.arc(c.x + c.size / 2, c.y - c.size / 4, c.size / 2.5, 0, Math.PI * 2);
                    this.ctx.arc(c.x + c.size, c.y, c.size / 2, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                // Desenha Árvores
                this.scenery.trees.forEach(t => {
                    this.ctx.fillStyle = '#795548';
                    this.ctx.fillRect(t.x + t.size * 0.4, t.y - t.size, t.size * 0.2, t.size);
                    this.ctx.fillStyle = '#2E7D32';
                    this.ctx.beginPath();
                    this.ctx.arc(t.x + t.size / 2, t.y - t.size, t.size / 1.5, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                // Desenha Plataformas
                this.platforms.forEach(p => {
                    this.ctx.fillStyle = p.color;
                    this.ctx.fillRect(p.x, p.y, p.width, p.height);
                    this.ctx.fillStyle = '#4CAF50';
                    this.ctx.fillRect(p.x, p.y, p.width, 8); // Grama
                });

                // Desenha Lixeiras
                this.bins.forEach(bin => {
                    this.ctx.fillStyle = bin.color;
                    this.ctx.beginPath();
                    this.ctx.roundRect(bin.x, bin.y, bin.width, bin.height, 5);
                    this.ctx.fill();
                    this.ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    this.ctx.fillRect(bin.x, bin.y, bin.width, 10);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('♻️', bin.x + bin.width / 2, bin.y + bin.height / 2 + 5);
                    
                    // Desenha a descrição do que jogar
                    this.ctx.font = 'bold 16px "Segoe UI"';
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeText(bin.label.toUpperCase(), bin.x + bin.width / 2, bin.y - 10);
                    this.ctx.fillStyle = bin.color; // Usa a própria cor da lixeira para a letra
                    this.ctx.fillText(bin.label.toUpperCase(), bin.x + bin.width / 2, bin.y - 10);
                });

                // Desenha Nuvens de Poluição (Inimigos)
                this.enemies.forEach(e => {
                    this.ctx.fillStyle = 'rgba(80, 80, 80, 0.8)';
                    this.ctx.beginPath();
                    this.ctx.arc(e.x + e.width/2, e.y + e.height/2, e.width/2, 0, Math.PI * 2);
                    this.ctx.arc(e.x + e.width/4, e.y + e.height/3, e.width/2.5, 0, Math.PI * 2);
                    this.ctx.arc(e.x + e.width*0.75, e.y + e.height/3, e.width/2.5, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.fillStyle = '#FF4757'; // Olhinhos maus
                    this.ctx.fillRect(e.x + 10, e.y + 15, 6, 4);
                    this.ctx.fillRect(e.x + 24, e.y + 15, 6, 4);
                });

                // Desenha Lixos no Chão
                this.ctx.font = '24px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.trashItems.forEach(i => {
                    if (i.active) this.ctx.fillText(i.emoji, i.x + i.width / 2, i.y + i.height / 2);
                });

                // Desenha a Porta
                if (this.door) {
                    this.ctx.fillStyle = '#5C4033';
                    this.ctx.fillRect(this.door.x, this.door.y, this.door.width, this.door.height);
                    if (this.door.isOpen) {
                        this.ctx.fillStyle = '#111';
                        this.ctx.fillRect(this.door.x + 5, this.door.y + 5, this.door.width - 10, this.door.height - 5);
                        this.ctx.fillStyle = '#4CAF50';
                        this.ctx.font = 'bold 16px Arial';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText('SAÍDA', this.door.x + this.door.width / 2, this.door.y - 10);
                    } else {
                        this.ctx.fillStyle = '#DAA520';
                        this.ctx.beginPath();
                        this.ctx.arc(this.door.x + 45, this.door.y + 40, 5, 0, Math.PI * 2);
                        this.ctx.fill();
                        this.ctx.fillStyle = '#FF0000'; // Vermelho mais forte
                        this.ctx.font = 'bold 16px "Arial Black", Arial';
                        this.ctx.textAlign = 'center';
                        
                        let msg = [];
                        if (!this.key.collected) msg.push('Falta Chave');
                        if (this.gameState.items < this.totalItemsToCollect) msg.push('Falta Lixo');
                        if (msg.length > 0) {
                            const warnText = msg.join(' e ');
                            this.ctx.strokeStyle = '#fff'; // Contorno branco para dar destaque
                            this.ctx.lineWidth = 3;
                            this.ctx.strokeText(warnText, this.door.x + this.door.width / 2, this.door.y - 15);
                            this.ctx.fillText(warnText, this.door.x + this.door.width / 2, this.door.y - 15);
                        }
                    }
                }

                // Desenha a Chave
                if (this.key && !this.key.collected) {
                    this.ctx.font = '24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('🔑', this.key.x + this.key.width / 2, this.key.y + this.key.height / 2);
                }

                // Desenha o Jogador
                this.ctx.save();
                // Move o contexto para o centro do jogador para aplicar rotações/espelhamento
                this.ctx.translate(this.player.x + this.player.width / 2, this.player.y + this.player.height / 2);
                
                // Animação de pulo e movimento
                if (!this.player.onGround) {
                    if (this.player.jumps > 1) { // Pulo Duplo: gira no ar
                        this.player.jumpRotation += this.player.facingRight ? 0.3 : -0.3;
                        this.ctx.rotate(this.player.jumpRotation);
                    } else { // Pulo Simples: dá uma leve inclinada com a velocidade
                        this.ctx.rotate(this.player.vy * 0.03 * (this.player.facingRight ? 1 : -1));
                        this.player.jumpRotation = 0;
                    }
                } else {
                    this.player.jumpRotation = 0;
                    // Animação de andar (leve balanço pros lados)
                    if (Math.abs(this.player.vx) > 0.5) {
                        this.ctx.rotate(Math.sin(this.player.animationFrame) * 0.15);
                    }
                }
                
                // Espelha a imagem caso ande para a esquerda
                if (!this.player.facingRight) {
                    this.ctx.scale(-1, 1);
                }
                
                // --- DESENHA O PERSONAGEM (GARI) - ESTILO PIXEL ART ---
                
                // Saco de lixo nas costas (Lado esquerdo)
                this.ctx.fillStyle = '#1e3d23'; 
                this.ctx.fillRect(-20, -5, 16, 24); // Corpo do saco
                this.ctx.fillRect(-22, 0, 20, 15);
                this.ctx.fillRect(-16, -12, 8, 6);  // Nó do saco
                this.ctx.fillStyle = '#2a522f';     // Detalhe de luz
                this.ctx.fillRect(-18, -3, 4, 18);

                // Pernas (Calça escura)
                this.ctx.fillStyle = '#2F4F4F';
                this.ctx.fillRect(-8, 12, 8, 12); // Perna esquerda
                this.ctx.fillRect(4, 12, 8, 12);  // Perna direita
                
                // Sapatos (Pretos)
                this.ctx.fillStyle = '#111';
                this.ctx.fillRect(-10, 24, 10, 4); // Sapato esquerdo
                this.ctx.fillRect(4, 24, 10, 4);   // Sapato direito

                // Tronco (Uniforme laranja)
                this.ctx.fillStyle = '#FF6347';
                this.ctx.fillRect(-10, -10, 20, 22);

                // Faixas refletivas do uniforme (Verde limão)
                this.ctx.fillStyle = '#ADFF2F';
                this.ctx.fillRect(-10, 0, 20, 4);   // Horizontal
                this.ctx.fillRect(2, -10, 4, 22);   // Vertical suspensório direito
                this.ctx.fillRect(-6, -10, 4, 10);  // Vertical suspensório esquerdo

                // Braço e Mão
                this.ctx.fillStyle = '#FF4500';
                this.ctx.fillRect(0, -8, 8, 14);
                this.ctx.fillStyle = '#FFCC99'; // Mão
                this.ctx.fillRect(0, 6, 8, 6);

                // Cabeça (Tom de pele)
                this.ctx.fillStyle = '#FFCC99';
                this.ctx.fillRect(-6, -24, 16, 14);

                // Boné (Laranja)
                this.ctx.fillStyle = '#FF6347';
                this.ctx.fillRect(-8, -28, 18, 6); // Topo do boné
                this.ctx.fillRect(-8, -22, 24, 4); // Aba do boné

                // Olhos (Pixelados)
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(2, -20, 3, 3);
                this.ctx.fillRect(8, -20, 3, 3);
                
                this.ctx.restore();
            }
        }

        // Inicializa o jogo quando a janela for carregada
        window.onload = () => {
            new EcoHeroGame();
        };
    </script>
</body>
</html>
